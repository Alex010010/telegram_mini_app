<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini App Dashboard</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: var(--tg-theme-bg-color, #ffffff);
      color: var(--tg-theme-text-color, #000000);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      background: var(--tg-theme-secondary-bg-color, #f0f0f0);
      border-radius: 16px;
      padding: 28px 20px;
      text-align: center;
      max-width: 360px;
      width: 100%;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    p {
      font-size: 14px;
      opacity: 0.7;
      margin-bottom: 20px;
    }

    .status {
      padding: 10px;
      border-radius: 10px;
      font-size: 13px;
      margin-top: 10px;
    }

    .ok { background: #d1f5d3; }
    .error { background: #ffd6d6; }
    .loading { background: #e6e6e6; }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1 id="titulo">Cargando...</h1>
    <p id="descripcion">Inicializando aplicación</p>

    <div id="status" class="status loading">
      Conectando con backend...
    </div>

    <div id="dashboard" class="hidden">
      <p>📊 Dashboard activo</p>
      <p id="userInfo"></p>
    </div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;

    tg.ready();
    tg.expand();

    const API_URL = "https://zegpganrjhmtqjgqyasu.supabase.co/functions/v1/auth-user-api";

    // 🔐 TU ANON KEY
    const SUPABASE_ANON_KEY = "sb_publishable_OEvO2fKh70iCxuLXRzjVqA_a4Nxs3qn";

    async function login() {
      const status = document.getElementById("status");
      const titulo = document.getElementById("titulo");
      const descripcion = document.getElementById("descripcion");
      const dashboard = document.getElementById("dashboard");
      const userInfo = document.getElementById("userInfo");

      const userUI = tg.initDataUnsafe?.user;

      if (!userUI) {
        status.className = "status error";
        status.innerText = "❌ Abre la app desde Telegram";
        return;
      }

      titulo.innerText = `Hola ${userUI.first_name} 👋`;
      descripcion.innerText = "Validando acceso...";

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
            "apikey": SUPABASE_ANON_KEY
          },
          body: JSON.stringify({
            initData: tg.initData
          })
        });

        const data = await res.json();

        if (!res.ok) {
          status.className = "status error";
          status.innerText = `❌ ${data.error || "Acceso denegado"}`;
          descripcion.innerText = "No autorizado";
          return;
        }

        // ✅ Usuario autenticado
        status.className = "status ok";
        status.innerText = "✅ Autenticado correctamente";

        descripcion.innerText = "Acceso concedido";

        dashboard.classList.remove("hidden");

        userInfo.innerText = `
ID: ${data.user.telegram_id}
Admin: ${data.user.is_admin ? "Sí" : "No"}
        `;

        console.log("Usuario backend:", data);

      } catch (err) {
        console.error("ERROR:", err);

        status.className = "status error";
        status.innerText = "❌ Error conectando con backend";

        descripcion.innerText = err.message;
      }
    }

    // 🚀 Auto login
    window.onload = login;
  </script>
</body>
</html>
