<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mini App</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      font-family: system-ui;
      background: var(--tg-theme-bg-color, #fff);
      color: var(--tg-theme-text-color, #000);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .box {
      text-align: center;
      padding: 24px;
      border-radius: 16px;
      background: var(--tg-theme-secondary-bg-color, #f3f3f3);
      width: 300px;
    }

    .status {
      margin-top: 12px;
      font-size: 14px;
      color: gray;
    }
  </style>
</head>

<body>
  <div class="box">
    <h2 id="title">Verificando...</h2>
    <div class="status" id="status">Conectando con servidor</div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const API_URL = "https://zegpganrjhmtqjgqyasu.supabase.co/functions/v1/auth-user-api";

    async function checkAccess() {
      const user = tg.initDataUnsafe?.user;

      const title = document.getElementById("title");
      const status = document.getElementById("status");

      if (!user) {
        window.location.href = "status.html?error=no-telegram";
        return;
      }

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            initData: tg.initData
          })
        });

        const data = await res.json();

        if (!res.ok) {
          if (data.error === "User not registered") {
            window.location.href = "status.html?error=not-registered";
            return;
          }

          if (data.error === "User inactive") {
            window.location.href = "status.html?error=blocked";
            return;
          }

          window.location.href = "status.html?error=unknown";
          return;
        }

        // OK → entrar app real
        window.location.href = "app.html";

      } catch (err) {
        window.location.href = "status.html?error=network";
      }
    }

    checkAccess();
  </script>
</body>
</html>
