<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mini App</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      font-family: system-ui;
      background: var(--tg-theme-bg-color, #fff);
      color: var(--tg-theme-text-color, #000);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      padding: 24px;
      border-radius: 16px;
      background: var(--tg-theme-secondary-bg-color, #f3f3f3);
      text-align: center;
      width: 320px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .ok { color: green; }
    .error { color: red; }
    .loading { color: gray; }
  </style>
</head>

<body>
  <div class="card">
    <h2 id="title">Cargando...</h2>
    <div id="status" class="loading">Verificando acceso...</div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const API_URL = "https://zegpganrjhmtqjgqyasu.supabase.co/functions/v1/auth-user-api";

    const title = document.getElementById("title");
    const status = document.getElementById("status");

    function render(type, message) {
      status.className = "status " + type;
      status.textContent = message;
    }

    async function init() {
      const user = tg.initDataUnsafe?.user;

      if (!user) {
        title.textContent = "Acceso denegado";
        render("error", "Abre la app desde Telegram");
        return;
      }

      title.textContent = `Hola ${user.first_name}`;

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ initData: tg.initData })
        });

        const data = await res.json();

        if (!res.ok) {
          if (data.error === "User not registered") {
            render("error", "🚫 Usuario no registrado");
            return;
          }

          if (data.error === "User inactive") {
            render("error", "⛔ Usuario desactivado");
            return;
          }

          render("error", "❌ Error de acceso");
          return;
        }

        render("ok", "✅ Acceso concedido");

        console.log("USER:", data.user);

      } catch (err) {
        render("error", "❌ Error backend");
      }
    }

    init();
  </script>
</body>
</html>
