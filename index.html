<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mini App</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      font-family: system-ui;
      background: var(--tg-theme-bg-color, #fff);
      color: var(--tg-theme-text-color, #000);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      padding: 24px;
      border-radius: 16px;
      background: var(--tg-theme-secondary-bg-color, #f3f3f3);
      text-align: center;
      width: 320px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h2 {
      margin-bottom: 10px;
    }

    .status {
      margin-top: 12px;
      font-size: 14px;
    }

    .ok { color: green; }
    .error { color: red; }
    .loading { color: gray; }
  </style>
</head>

<body>
  <div class="card">
    <h2 id="title">Cargando...</h2>
    <div id="status" class="status loading">Verificando acceso...</div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const API_URL = "https://zegpganrjhmtqjgqyasu.supabase.co/functions/v1/auth-user-api";

    const title = document.getElementById("title");
    const status = document.getElementById("status");

    async function init() {
      const user = tg.initDataUnsafe?.user;

      // 1. Check básico de Telegram
      if (!user) {
        title.textContent = "Acceso denegado";
        status.textContent = "Abre esta app desde Telegram";
        status.className = "status error";
        return;
      }

      title.textContent = `Hola ${user.first_name}`;

      try {
        // 2. Llamada a backend con initData real
        const res = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            initData: tg.initData
          })
        });

        const data = await res.json();

        // 3. Manejo de errores backend
        if (!res.ok) {
          status.className = "status error";

          if (data.error === "User not registered") {
            status.textContent = "🚫 Usuario no registrado";
          } 
          else if (data.error === "User inactive") {
            status.textContent = "⛔ Usuario desactivado";
          } 
          else if (data.error === "Unauthorized telegram") {
            status.textContent = "🔐 Firma inválida";
          } 
          else {
            status.textContent = "❌ Error: " + (data.error || "desconocido");
          }

          return;
        }

        // 4. OK
        status.className = "status ok";
        status.textContent = "✅ Acceso concedido";

        console.log("USER LOGGED:", data.user);

      } catch (err) {
        status.className = "status error";
        status.textContent = "❌ Error de conexión con backend";
        console.error(err);
      }
    }

    init();
  </script>
</body>
</html>
