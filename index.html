<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Mini App</title>

  <!-- SDK oficial de Telegram Web Apps -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: var(--tg-theme-bg-color, #ffffff);
      color: var(--tg-theme-text-color, #000000);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .card {
      background: var(--tg-theme-secondary-bg-color, #f0f0f0);
      border-radius: 16px;
      padding: 32px 24px;
      text-align: center;
      max-width: 340px;
      width: 100%;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    p {
      font-size: 15px;
      opacity: 0.7;
      line-height: 1.6;
    }

    .btn {
      margin-top: 24px;
      display: inline-block;
      padding: 12px 28px;
      background: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #ffffff);
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="titulo">¡Hola mundo! 👋</h1>
    <p id="descripcion">Esta es tu primera Telegram Mini App publicada en GitHub Pages.</p>
    <button class="btn" onclick="onBotonClick()">Mostrar usuario</button>
  </div>

  <script>
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();

  async function onBotonClick() {
    const userUI = tg.initDataUnsafe?.user;

    if (!userUI) {
      tg.showAlert("Abre la app desde Telegram");
      return;
    }

    // Mostrar usuario (solo UI)
    document.getElementById("titulo").innerText = `Hola ${userUI.first_name} 👋`;

    try {
      const res = await fetch("https://zegpganrjhmtqjgqyasu.supabase.co/functions/v1/auth-user-api", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          initData: tg.initData
        })
      });

      const data = await res.json();

      // 🔐 CONTROL REAL
      if (!res.ok) {
        document.getElementById("descripcion").innerText =
          `❌ Acceso denegado: ${data.error}`;
        return;
      }

      // ✅ Usuario validado
      document.getElementById("descripcion").innerText =
        `✅ Autenticado | ID: ${data.user.telegram_id}`;

      console.log("Usuario backend:", data);

    } catch (err) {
      console.error(err);
      tg.showAlert("Error conectando con backend");
    }
  }
</script>
</body>
</html>
