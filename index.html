<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mini App</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      font-family: system-ui;
      background: var(--tg-theme-bg-color, #fff);
      color: var(--tg-theme-text-color, #000);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      padding: 20px;
      border-radius: 16px;
      background: var(--tg-theme-secondary-bg-color, #f3f3f3);
      text-align: center;
      width: 300px;
    }

    .status {
      margin-top: 10px;
      font-size: 14px;
    }

    .ok { color: green; }
    .error { color: red; }
    .loading { color: gray; }
  </style>
</head>

<body>
  <div class="card">
    <h2 id="title">Cargando...</h2>
    <div id="status" class="status loading">Conectando...</div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const API_URL = "https://zegpganrjhmtqjgqyasu.supabase.co/functions/v1/auth-user-api";

    async function login() {
      const status = document.getElementById("status");
      const title = document.getElementById("title");

      const user = tg.initDataUnsafe?.user;

      if (!user) {
        status.textContent = "Abre la app desde Telegram";
        status.className = "status error";
        return;
      }

      title.textContent = `Hola ${user.first_name}`;

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            initData: tg.initData
          })
        });

        const data = await res.json();

        if (!res.ok) {
          status.textContent = "❌ " + (data.error || "Error");
          status.className = "status error";
          return;
        }

        status.textContent = "✅ Autenticado";
        status.className = "status ok";

        console.log("USER:", data.user);

      } catch (err) {
        status.textContent = "❌ Error backend";
        status.className = "status error";
        console.error(err);
      }
    }

    window.onload = login;
  </script>
</body>
</html>
